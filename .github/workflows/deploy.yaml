name: CI/CD Pipeline - Build & Deploy

on:
  push:
    branches:
      - main # Déclenche le build à chaque push sur la branche main

env:
  REGISTRY: ghcr.io
  # Convertit automatiquement le nom du repo en minuscules (requis par Docker)
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to the Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta-backend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/backend

      - id: meta-frontend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/frontend

      # On utilise Buildx pour compiler proprement
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Build & Push du Backend
      - name: Build and push Backend Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/backend:latest
          labels: ${{ id.meta-backend.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Build & Push du Frontend
      - name: Build and push Frontend Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./DataShare_Frontend
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/frontend:latest
          labels: ${{ id.meta-frontend.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository (pour avoir le compose.yaml)
        uses: actions/checkout@v4

      # Connexion SSH au serveur pour copier le compose.yaml et relancer les conteneurs
      - name: Deploy to Server via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          port: ${{ secrets.SERVER_PORT || 22 }} # <-- Utilise le port ngrok s'il existe, sinon 22 par défaut
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            mkdir -p /app/datashare
            cd /app/datashare
            
            # On écrit le compose.yaml à jour sur le serveur
            cat << 'EOF' > compose.yaml
            ${{ github.workspace }}/compose.yaml
            EOF
            
            # Se connecter au registre GitHub depuis le serveur
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            
            # Télécharger les nouvelles images et redémarrer
            docker compose pull
            docker compose up -d --remove-orphans